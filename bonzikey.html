<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonzi.Site - Key Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a3e;
    }
    #app {
      min-height: 420px;
      background: linear-gradient(135deg, #2a1a5e 0%, #4a2d8a 50%, #6b3fa0 100%);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      width: 460px;
      max-width: 95vw;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    #app::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(180,130,255,0.12);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .logo span { color: #c084fc; }
    .tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .step-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }
    .step-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .timer-circle {
      width: 106px; height: 106px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      margin: 0 auto 1.5rem;
      position: relative;
    }
    .timer-num {
      font-size: 22px;
      font-weight: 700;
      color: #c084fc;
      line-height: 1;
    }
    .timer-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    svg.ring {
      position: absolute; top: 0; left: 0;
      transform: rotate(-90deg);
    }
    .progress-bar {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      background: #c084fc;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(192,132,252,0.4);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 18px;
      text-align: center;
      margin-bottom: 1rem;
      outline: none;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .key-box {
      background: rgba(0,0,0,0.35);
      border: 1px solid #c084fc;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .key-value { font-size: 24px; font-weight: 700; color: #c084fc; font-family: monospace; }
    .error { color: #f87171; font-size: 13px; margin-bottom: 10px; }
    
    /* Initial states */
    #step1 { display: block; }
    #step2, #step3 { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <div class="logo">Bonzi<span>.Site</span></div>
    <div class="tagline">Key Generator</div>

    <div class="card">
      <div id="step1">
        <div class="step-title">Generating your key...</div>
        <div class="step-sub">Please wait while we prepare your access key.</div>
        <div class="timer-circle">
          <svg class="ring" width="106" height="106">
            <circle cx="53" cy="53" r="50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
            <circle id="ring-fill" cx="53" cy="53" r="50" fill="none" stroke="#c084fc" stroke-width="4"
              stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round"/>
          </svg>
          <div class="timer-num" id="timer-display">01:00</div>
          <div class="timer-label">remaining</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
        <div class="progress-text" id="prog-text">0% complete</div>
      </div>

      <div id="step2">
        <div class="step-title">Admin Verification</div>
        <div class="step-sub">Enter the admin key to unlock.</div>
        <input type="password" id="admin-input" placeholder="••••••" maxlength="20">
        <div class="error" id="err-msg" style="display:none">Access Denied. Try again.</div>
        <button class="btn" onclick="verifyKey()">Verify</button>
      </div>

      <div id="step3">
        <div class="step-title">&#10003; Key Generated</div>
        <div class="step-sub">Copy your license key below.</div>
        <div class="key-box">
          <div class="key-value">BZ-8821-XQ</div>
        </div>
        <a href="#" class="btn" style="text-decoration:none; display:block" onclick="location.reload()">Generate Another</a>
      </div>
    </div>
  </div>

  <script>
    const DURATION = 60; // seconds
    let timeLeft = DURATION;

    function updateUI() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      const progress = ((DURATION - timeLeft) / DURATION);
      const offset = 314 - (314 * progress);

      document.getElementById('timer-display').textContent = display;
      document.getElementById('prog').style.width = (progress * 100) + '%';
      document.getElementById('prog-text').textContent = Math.round(progress * 100) + '% complete';
      document.getElementById('ring-fill').style.strokeDashoffset = offset;
    }

    const timer = setInterval(() => {
      timeLeft--;
      updateUI();

      if (timeLeft <= 0) {
        clearInterval(timer);
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      }
    }, 1000);

    function verifyKey() {
      const val = document.getElementById('admin-input').value;
      if (val === '003679') {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
      } else {
        document.getElementById('err-msg').style.display = 'block';
      }
    }

    document.getElementById('admin-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyKey();
    });
  </script>
</body>
</html>
