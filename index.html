
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

  #zaware-root {
    min-height: 100vh;
    width: 100%;
    background: #0a0010;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    position: relative;
    overflow: hidden;
  }

  #stars-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
  }
  .nebula-1 { width: 500px; height: 500px; background: #7f00ff; top: -100px; left: -100px; }
  .nebula-2 { width: 400px; height: 400px; background: #0ff; bottom: -80px; right: -80px; }
  .nebula-3 { width: 300px; height: 300px; background: #ff00aa; top: 40%; left: 30%; }

  #loading-screen, #key-screen {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px;
  }

  #key-screen { display: none; }

  .site-title {
    font-family: 'Orbitron', monospace;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #bf00ff, #00cfff, #ff00aa, #bf00ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    text-shadow: none;
    text-transform: uppercase;
  }

  @keyframes gradShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .loading-text {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 400;
    color: #c0a0ff;
    letter-spacing: 4px;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-bar-wrap {
    width: 340px;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, #bf00ff, #00cfff);
    transition: width 0.1s linear;
    box-shadow: 0 0 12px #bf00ff;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(191,0,255,0.2);
    border-top: 3px solid #bf00ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .key-header {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 400;
    color: #00cfff;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.9;
  }

  .key-label {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-align: center;
  }

  .key-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(191,0,255,0.4);
    border-radius: 12px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 700px;
    box-shadow: 0 0 30px rgba(191,0,255,0.15), inset 0 0 20px rgba(0,207,255,0.05);
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .key-value {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 400;
    color: #00ffcc;
    letter-spacing: 2px;
    word-break: break-all;
    line-height: 1.8;
  }

  .copy-btn {
    background: linear-gradient(135deg, #bf00ff22, #00cfff22);
    border: 1px solid rgba(191,0,255,0.5);
    color: #bf00ff;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: linear-gradient(135deg, #bf00ff44, #00cfff44);
    box-shadow: 0 0 16px rgba(191,0,255,0.4);
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #bf00ff, transparent);
    margin: 4px 0;
  }

  .weekly-badge {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: #ff00aa;
    background: rgba(255,0,170,0.1);
    border: 1px solid rgba(255,0,170,0.3);
    border-radius: 20px;
    padding: 5px 18px;
    text-transform: uppercase;
  }
</style>

<div id="zaware-root">
  <canvas id="stars-canvas"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div id="loading-screen">
    <div class="site-title">ZAWARE</div>
    <div class="spinner"></div>
    <div class="loading-text">Loading tight!</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="key-screen">
    <div class="site-title">ZAWARE</div>
    <div class="divider"></div>
    <div class="key-header">Access Portal</div>
    <div class="key-label">Here is your key</div>
    <div class="weekly-badge">Weekly</div>
    <div class="key-box">
      <div class="key-value" id="key-display">Ek9v38Ktn3SLuMALIxCXmRTE$GDRGDFWE$FSSDGSD5345ff-ZAWARE</div>
      <button class="copy-btn" onclick="copyKey()" id="copy-btn">COPY</button>
    </div>
    <div class="divider"></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();

  const stars = Array.from({length: 180}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 0.0003 + 0.0001,
    opacity: Math.random() * 0.8 + 0.2
  }));

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > 1) { s.y = 0; s.x = Math.random(); }
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  const fill = document.getElementById('progress-fill');
  let prog = 0;
  const interval = setInterval(() => {
    prog += (100 - prog) * 0.025 + 0.3;
    if (prog >= 100) prog = 100;
    fill.style.width = prog + '%';
    if (prog >= 100) {
      clearInterval(interval);
      setTimeout(showKey, 400);
    }
  }, 50);

  function showKey() {
    document.getElementById('loading-screen').style.display = 'none';
    const ks = document.getElementById('key-screen');
    ks.style.display = 'flex';
  }

  function copyKey() {
    const key = 'Ek9v38Ktn3SLuMALIxCXmRTE$GDRGDFWE$FSSDGSD5345ff-ZAWARE';
    navigator.clipboard.writeText(key).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'COPIED!';
      btn.style.color = '#00ffcc';
      setTimeout(() => { btn.textContent = 'COPY'; btn.style.color = ''; }, 2000);
    });
  }
</script>
