<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #00c853, #003300);
        color: white;
    }

    .box {
        background: rgba(0, 0, 0, 0.4);
        padding: 35px 45px;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 0 25px rgba(0, 255, 120, 0.5);
        border: 1px solid rgba(0, 255, 120, 0.6);
        max-width: 650px;
        animation: fadeIn 1.2s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .title {
        font-size: 38px;
        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 0 0 12px rgba(0, 255, 120, 0.8);
    }

    .label {
        font-size: 20px;
        margin-top: 20px;
        opacity: 0.9;
    }

    .key {
        margin-top: 10px;
        font-size: 26px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 12px 20px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 255, 120, 0.7);
        display: inline-block;
        user-select: all;
    }

    .btn {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 28px;
        font-size: 20px;
        color: white;
        background: rgba(0, 255, 120, 0.3);
        border: 1px solid rgba(0, 255, 120, 0.6);
        border-radius: 10px;
        text-decoration: none;
        backdrop-filter: blur(4px);
        transition: 0.25s ease;
    }

    .btn:hover {
        background: rgba(0, 255, 120, 0.6);
        box-shadow: 0 0 15px rgba(0, 255, 120, 0.7);
        transform: scale(1.05);
    }
</style>
</head>
<body>

<div class="box">
    <div class="title">✅ SUCCESS!</div>
    <div>Your payment has been verified and access has been granted.</div>

    <div class="label">Permission Key:</div>
