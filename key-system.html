<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEY SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-core: #00d4ff;
    --blue-deep: #0047ff;
    --blue-glow: #00aaff;
    --blue-dark: #001a33;
    --blue-darker: #000d1a;
    --accent: #00ffea;
    --danger: #ff3c6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blue-darker);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPan 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridPan {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0, 71, 255, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--blue-core);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--blue-core);
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(calc(sin(1rad) * 80px)); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    width: min(520px, 95vw);
    background: linear-gradient(135deg, rgba(0, 20, 50, 0.95), rgba(0, 10, 30, 0.98));
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 4px;
    padding: 48px 40px;
    z-index: 10;
    box-shadow:
      0 0 60px rgba(0, 71, 255, 0.3),
      0 0 120px rgba(0, 71, 255, 0.1),
      inset 0 1px 0 rgba(0, 212, 255, 0.2);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
  }
  .card::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--blue-core);
    border-left: 2px solid var(--blue-core);
    box-shadow: -2px -2px 10px rgba(0, 212, 255, 0.5);
  }
  .card::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--blue-core);
    border-right: 2px solid var(--blue-core);
    box-shadow: 2px 2px 10px rgba(0, 212, 255, 0.5);
  }

  /* Scan line */
  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-core), transparent);
    animation: scan 3s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* Header badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 2px;
    padding: 4px 12px;
    margin-bottom: 20px;
    animation: cardIn 0.8s 0.1s both;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .badge-text {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--blue-core);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
    animation: cardIn 0.8s 0.15s both;
  }

  h1 span {
    color: var(--blue-core);
    text-shadow: 0 0 20px var(--blue-core), 0 0 40px rgba(0, 212, 255, 0.4);
  }

  .subtitle {
    color: rgba(0, 212, 255, 0.5);
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 36px;
    animation: cardIn 0.8s 0.2s both;
  }

  /* Auth screen */
  #auth-screen, #key-screen { width: 100%; }
  #key-screen { display: none; }

  .field-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--blue-core);
    opacity: 0.7;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
    animation: cardIn 0.8s 0.25s both;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(0, 212, 255, 0.05);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 2px;
    padding: 14px 16px;
    color: var(--blue-core);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    outline: none;
    transition: all 0.3s;
  }

  .input-wrap input::placeholder {
    color: rgba(0, 212, 255, 0.25);
    letter-spacing: 1px;
  }

  .input-wrap input:focus {
    border-color: var(--blue-core);
    background: rgba(0, 212, 255, 0.08);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.15), inset 0 0 10px rgba(0, 212, 255, 0.05);
  }

  .input-glow {
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--blue-core);
    transition: width 0.3s;
    box-shadow: 0 0 10px var(--blue-core);
  }

  .input-wrap input:focus ~ .input-glow { width: 100%; }

  /* Error message */
  .error-msg {
    color: var(--danger);
    font-size: 11px;
    letter-spacing: 1px;
    font-family: 'Orbitron', monospace;
    margin-bottom: 14px;
    display: none;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .error-msg.show { display: block; }

  /* Button */
  .btn {
    width: 100%;
    background: linear-gradient(135deg, rgba(0, 71, 255, 0.8), rgba(0, 170, 255, 0.6));
    border: 1px solid rgba(0, 212, 255, 0.5);
    border-radius: 2px;
    padding: 16px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    animation: cardIn 0.8s 0.3s both;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.5s;
  }

  .btn:hover {
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 71, 255, 0.2);
    border-color: var(--blue-core);
    transform: translateY(-1px);
  }

  .btn:hover::before { left: 100%; }
  .btn:active { transform: translateY(0); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    animation: cardIn 0.8s 0.35s both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
  }

  .divider-icon {
    color: rgba(0, 212, 255, 0.4);
    font-size: 18px;
  }

  /* Key display box */
  .key-box {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 2px;
    padding: 20px;
    position: relative;
    margin-bottom: 16px;
    animation: keyReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes keyReveal {
    from { opacity: 0; transform: scaleY(0.8); filter: blur(4px); }
    to { opacity: 1; transform: scaleY(1); filter: blur(0); }
  }

  .key-box::before {
    content: 'YOUR KEY';
    position: absolute;
    top: -9px; left: 16px;
    background: var(--blue-darker);
    padding: 0 8px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--blue-core);
  }

  .key-text {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    word-break: break-all;
    text-shadow: 0 0 10px rgba(0, 255, 234, 0.5);
    line-height: 1.6;
    text-align: center;
  }

  /* Copy button */
  .copy-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-radius: 2px;
    padding: 10px;
    color: rgba(0, 212, 255, 0.6);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .copy-btn:hover {
    background: rgba(0, 212, 255, 0.08);
    border-color: var(--blue-core);
    color: var(--blue-core);
  }

  /* Success header on key screen */
  .success-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .success-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.8));
    animation: iconPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes iconPop {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .success-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    line-height: 1.3;
  }

  .success-title span { color: var(--blue-core); }

  .success-sub {
    color: rgba(0, 212, 255, 0.4);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    text-align: center;
    color: rgba(0, 212, 255, 0.2);
    font-size: 11px;
    letter-spacing: 2px;
    font-family: 'Orbitron', monospace;
    animation: cardIn 0.8s 0.4s both;
  }

  /* Hexagon decoration */
  .hex-deco {
    position: fixed;
    width: 300px; height: 300px;
    border: 1px solid rgba(0, 212, 255, 0.04);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: hexSpin 30s linear infinite;
  }

  .hex-deco:nth-child(1) { top: -100px; right: -100px; animation-duration: 25s; }
  .hex-deco:nth-child(2) { bottom: -150px; left: -80px; animation-duration: 35s; animation-direction: reverse; width: 400px; height: 400px; }

  @keyframes hexSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="hex-deco"></div>
<div class="hex-deco"></div>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="scanline"></div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Secure Gateway</span>
    </div>

    <h1><span>KEY</span> SYSTEM<br>ACCESS PORTAL</h1>
    <p class="subtitle">// ENTER CUSTOMER KEY TO PROCEED</p>

    <div class="field-label">Customer Verification Key</div>
    <div class="input-wrap">
      <input type="password" id="key-input" placeholder="Enter your customer key..." autocomplete="off" />
      <div class="input-glow"></div>
    </div>

    <div class="error-msg" id="error-msg">⚠ INVALID KEY — ACCESS DENIED</div>

    <button class="btn" onclick="verifyKey()">
      ⚡ VERIFY & ENTER
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">◈</span>
      <div class="divider-line"></div>
    </div>

    <div class="footer">AUTHORIZED USERS ONLY · SYSTEM PROTECTED</div>
  </div>

  <!-- KEY SCREEN -->
  <div id="key-screen">
    <div class="success-header">
      <span class="success-icon">🔑</span>
      <div class="success-title">THANK YOU FOR DOING<br>OUR <span>KEY SYSTEM!</span></div>
      <div class="success-sub">// HERE IS YOUR KEY BELOW</div>
    </div>

    <div class="key-box">
      <div class="key-text">YOUR-KEY-HERE</div>
    </div>

    <button class="copy-btn" onclick="copyKey()">⊕ COPY KEY TO CLIPBOARD</button>

    <div class="footer" style="margin-top: 20px;">KEEP YOUR KEY SAFE · DO NOT SHARE</div>
  </div>
</div>

<script>
  // Spawn particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 15) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }

  const CORRECT_KEY = "TD^]i4;(?+NBp$lt**^LBY3[VA0GCXg";

  function verifyKey() {
    const input = document.getElementById('key-input').value.trim();
    const error = document.getElementById('error-msg');

    if (input === CORRECT_KEY) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('key-screen').style.display = 'block';
    } else {
      error.classList.remove('show');
      void error.offsetWidth; // reflow to restart animation
      error.classList.add('show');
      document.getElementById('key-input').value = '';
    }
  }

  document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') verifyKey();
  });

  function copyKey() {
    navigator.clipboard.writeText('YOUR-KEY-HERE').then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ COPIED TO CLIPBOARD!';
      btn.style.color = '#00ffea';
      btn.style.borderColor = '#00ffea';
      setTimeout(() => {
        btn.textContent = '⊕ COPY KEY TO CLIPBOARD';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 2000);
    });
  }
</script>
</body>
</html>
