<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #00c853, #003300);
        color: white;
    }

    .box {
        background: rgba(0, 0, 0, 0.4);
        padding: 35px 45px;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 0 25px rgba(0, 255, 120, 0.5);
        border: 1px solid rgba(0, 255, 120, 0.6);
        max-width: 600px;
    }

    .title {
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 0 0 12px rgba(0, 255, 120, 0.8);
    }

    .label {
        font-size: 20px;
        margin-top: 15px;
        opacity: 0.9;
    }

    .key {
        margin-top: 8px;
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px 18px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 255, 120, 0.7);
        display: inline-block;
        user-select: all;
    }
</style>
</head>
<body>

<div class="box">
    <div class="title">✅ SUCCESS!</div>
    <div>Your payment has been confirmed and access has been granted.</div>

    <div class="label">Permission Key:</div>
    <div class="key">PK-9F2X-7Q1L-ALPHA</div>
</div>

</body>
</html>
