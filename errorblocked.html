<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Error</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
        animation: breathe 6s ease-in-out infinite;
        background: #8b0000;
    }

    @keyframes breathe {
        0% { transform: scale(1); background-color: #5a0000; }
        50% { transform: scale(1.05); background-color: #b30000; }
        100% { transform: scale(1); background-color: #5a0000; }
    }

    .error-box {
        background: rgba(0, 0, 0, 0.35);
        padding: 30px 40px;
        border-radius: 14px;
        border: 1px solid rgba(255, 0, 0, 0.5);
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        text-align: center;
        max-width: 600px;
        font-size: 22px;
        line-height: 1.5;
    }

    .title {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
    }
</style>
</head>
<body>

<div class="error-box">
    <div class="title">⚠️ ERROR</div>
    Payment link status has been detected and is no longer available for you.<br>
    Access to this page has been restricted.
</div>

</body>
</html>
