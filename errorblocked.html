<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error – Breathe In, Breathe Out</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #1a1a1a, #000);
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    .circle {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
        0% { transform: scale(0.7); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(0.7); opacity: 0.6; }
    }

    .text {
        position: absolute;
        top: 65%;
        text-align: center;
        font-size: 22px;
        opacity: 0;
        animation: fadeText 6s ease-in-out infinite;
    }

    @keyframes fadeText {
        0% { opacity: 0; }
        20% { opacity: 1; content: "Inhale"; }
        50% { opacity: 1; }
        80% { opacity: 1; }
        100% { opacity: 0; }
    }

    .error-box {
        position: absolute;
        top: 10%;
        background: rgba(255, 0, 0, 0.15);
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid rgba(255, 0, 0, 0.4);
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        backdrop-filter: blur(6px);
        font-size: 20px;
    }

    .exhale {
        animation: exhaleText 6s ease-in-out infinite;
    }

    @keyframes exhaleText {
        0% { opacity: 0; }
        50% { opacity: 0; }
        60% { opacity: 1; }
        100% { opacity: 0; }
    }
</style>
</head>
<body>

<div class="error-box">
    ⚠️ Error: Something went wrong
</div>

<div class="circle"></div>

<div class="text">Inhale…</div>
<div class="text exhale" style="top: 75%;">Exhale…</div>

</body>
</html>
